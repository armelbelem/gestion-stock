version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: gestion_stock_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password_secret
      MYSQL_DATABASE: gestion_stock_db
      MYSQL_USER: admin_stock
      MYSQL_PASSWORD: mot_de_passe_secret
    volumes:
      # Sauvegarde des données de la DB pour ne pas les perdre
      - db_data:/var/lib/mysql
      # Exécute automatiquement le fichier SQL au premier démarrage !
      - ./gestion_stock_db.sql:/docker-entrypoint-initdb.d/gestion_stock_db.sql
    ports:
      - "3306:3306"

  app:
    build: .
    container_name: gestion_stock_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Le host est le nom du service DB ci-dessus !
      DB_HOST: db
      DB_USER: admin_stock
      DB_PASSWORD: mot_de_passe_secret
      DB_NAME: gestion_stock_db
    depends_on:
      - db

volumes:
  db_data:
